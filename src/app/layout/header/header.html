<header class="bg-gradient-to-r from-cyan-700 via-sky-700 to-indigo-800 shadow-sm border-b border-gray-200 sticky top-0 z-10">
    <div class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
            <!-- Логотип -->
            <a routerLink="/" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-white/90 backdrop-blur rounded-lg flex items-center justify-center">
                    <img class="h-9" src="assets\logo.png">
                </div>
                <div>
                    <span class="text-xl font-semibold text-gray-100">ОКНО В </span>
                    <span class="text-xl font-semibold text-red-700">РОССИЮ</span>
                </div>
            </a>

            <!-- Навигация (десктоп) -->
            <nav class="hidden md:flex space-x-8">
                <a routerLink="/routes" routerLinkActive="text-emerald-700"
                   class="px-3 py-2 rounded text-gray-100 hover:bg-cyan-600 hover:text-white transition">Маршруты</a>
                <a routerLink="/objects" routerLinkActive="text-emerald-700"
                   class="px-3 py-2 rounded text-gray-100 hover:bg-cyan-600 hover:text-white transition">Объекты</a>
                <a routerLink="/transport" routerLinkActive="text-emerald-700"
                   class="px-3 py-2 rounded text-gray-100 hover:bg-cyan-600 hover:text-white transition">Транспорт</a>
                <a routerLink="/accommodation" routerLinkActive="text-emerald-700"
                   class="px-3 py-2 rounded text-gray-100 hover:bg-cyan-600 hover:text-white transition">Жилье</a>
                <a routerLink="/accessible" routerLinkActive="text-emerald-700"
                   class="px-3 py-2 rounded text-gray-100 hover:bg-cyan-600 hover:text-white transition">Доступная среда</a>
            </nav>

            <!-- Профиль и мобильное меню -->
            <div class="flex items-center space-x-4">
                <button class="px-2 py-2 rounded text-gray-100 hover:bg-cyan-600 text-white transition"
                        aria-label="Профиль">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </button>
                <button class="md:hidden p-2 text-gray-500 hover:text-emerald-700 transition"
                        aria-label="Меню">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>
