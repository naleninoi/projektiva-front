<div class="min-h-screen flex flex-col">
    <app-header />

    <main class="flex-1 container mx-auto px-4 py-8">
        <!-- Хлебные крошки -->
        <div class="flex items-center text-sm text-gray-500 mb-6">
            <a routerLink="/" class="hover:text-emerald-600 transition">Главная</a>
            <span class="mx-2">/</span>
            <span class="text-gray-800">{{ object()?.name || 'Загрузка...' }}</span>
        </div>

        <!-- Состояние загрузки -->
        @if (loading()) {
            <div class="flex justify-center items-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-700"></div>
            </div>
        }

        <!-- Состояние ошибки -->
        @else if (error()) {
            <div class="text-center py-12">
                <div class="text-red-500 mb-4 text-4xl">⚠️</div>
                <p class="text-gray-600 mb-4">{{ error() }}</p>
                <button
                        (click)="goBack()"
                        class="bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 transition"
                >
                    Вернуться на главную
                </button>
            </div>
        }

        <!-- Детальная информация -->
        @else if (object()) {
            <!-- Заголовок и рейтинг -->
            <div class="flex flex-wrap items-start justify-between mb-6">
                <div>
                    <h1 class="text-3xl md:text-4xl font-light text-gray-800 mb-2">{{ object()!.name }}</h1>
                    <div class="flex flex-wrap items-center gap-3">
            <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm">
              {{ object()!.typeLabel }}
            </span>
                        <span class="text-gray-500 text-sm">{{ object()!.location.region }}</span>
                    </div>
                </div>
                <div class="flex items-center mt-3 md:mt-0 bg-white px-4 py-2 rounded-lg border border-gray-200">
                    <div class="flex items-center mr-3">
                        <span class="text-yellow-400 text-xl mr-1">★</span>
                        <span class="text-lg font-medium text-gray-800">{{ object()!.rating }}</span>
                    </div>
                    <span class="text-sm text-gray-500">({{ object()!.reviewsCount }} отзывов)</span>
                </div>
            </div>

            <!-- Основная сетка: галерея + боковая панель -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                <!-- Галерея (2 колонки) -->
                <div class="lg:col-span-2">
                    <app-object-gallery
                            [images]="object()!.images"
                            [name]="object()!.name"
                    />
                </div>

                <!-- Боковая панель (1 колонка) -->
                <div>
                    <app-object-sidebar
                            [object]="object()!"
                            (bookClick)="onBook()"
                    />
                </div>
            </div>

            <!-- Детальная информация (две колонки) -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Основная информация (2 колонки) -->
                <div class="lg:col-span-2 space-y-8">
                    <app-object-info [object]="object()!" />
                    <app-object-map [object]="object()!" />
                    <app-object-reviews [object]="object()!" />
                </div>

                <!-- Правая колонка (пока пустая, можно добавить похожие объекты) -->
                <div class="space-y-8">
                    <!-- Здесь можно добавить блок "Похожие объекты" позже -->
                </div>
            </div>
        }
    </main>

    <app-footer />
</div>
